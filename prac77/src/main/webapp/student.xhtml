<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>Student Form</title>
</h:head>
<h:body>
    <h2>Student Information Form</h2>
    
    <h:form>
        <h:panelGrid columns="2" cellpadding="5">
            <h:outputLabel for="name" value="Name:" />
            <h:inputText id="name" value="#{studentbean.name}" required="true"/>

            <h:outputLabel for="rollNo" value="Roll No:" />
            <h:inputText id="rollNo" value="#{studentbean.rollNo}" required="true"/>

            <h:outputLabel for="course" value="Course:" />
            <h:inputText id="course" value="#{studentbean.course}" required="true"/>

            <h:outputLabel />
            <h:commandButton value="Submit" action="#{studentbean.submit}" />
        </h:panelGrid>
    </h:form>
</h:body>
</html>
